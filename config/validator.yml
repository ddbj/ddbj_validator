# Validator 全体の実行時設定。
#
# - development / test: ENV か固定値。秘密情報は入れない。
# - staging / production: 接続先等の非秘密設定はこのファイル (環境ごとセクション) に、
#   パスワードや API キーは Rails.application.credentials に置く。
#   `bin/rails credentials:edit --environment <env>` で編集。
default: &default
  biosample:
    package_version: '1.5.0'

development: &dev
  <<: *default
  api_log:
    path: logs
  sparql_endpoint:
    master_endpoint: <%= ENV.fetch('VIRTUOSO_ENDPOINT_MASTER', 'http://localhost:8890/sparql') %>
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy
  ddbj_rdb:
    pg_host:    <%= ENV.fetch('PGHOST', 'localhost') %>
    pg_port:    <%= ENV.fetch('PGPORT', 5432) %>
    pg_user:    <%= ENV.fetch('PGUSER', 'validator') %>
    pg_pass:    <%= ENV.fetch('PGPASSWORD', 'validator') %>
    pg_timeout: 30
  monitoring:
    ssub_id: SSUB009526

test:
  <<: *dev
  # compose.test.yaml で立ち上がる Virtuoso / Postgres を必ず指す。
  # Postgres は dev と port が衝突しないよう 15432 にずらしてある。
  sparql_endpoint:
    master_endpoint: http://localhost:8890/sparql
  ddbj_rdb:
    pg_host:    localhost
    pg_port:    15432
    pg_user:    validator
    pg_pass:    validator
    pg_timeout: 30

staging:
  <<: *default
  api_log:
    path: /rails/logs
  sparql_endpoint:
    master_endpoint: http://virtuoso:8890/sparql
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy-private
  ddbj_rdb:
    pg_host:    172.19.15.12
    pg_port:    54301
    pg_user:    const
    pg_pass:    <%= Rails.application.credentials.dig(:postgres, :password) %>
    pg_timeout: 30
  monitoring:
    ssub_id: SSUB004022

production:
  <<: *default
  api_log:
    path: /rails/logs
  sparql_endpoint:
    master_endpoint: http://virtuoso:8890/sparql
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy-private
  ddbj_rdb:
    pg_host:    172.19.15.11
    pg_port:    54301
    pg_user:    const
    pg_pass:    <%= Rails.application.credentials.dig(:postgres, :password) %>
    pg_timeout: 30
  monitoring:
    ssub_id: SSUB004022
