# Validator 全体の実行時設定。
#
# - development / test: ENV か固定値。秘密情報は入れない。
# - staging / production: 接続先等の非秘密設定はこのファイル (環境ごとセクション) に、
#   パスワードや API キーは Rails.application.credentials に置く。
#   `bin/rails credentials:edit --environment <env>` で編集。
default: &default
  biosample:
    package_version: '1.5.0'

development: &dev
  <<: *default
  api_log:
    path: logs
  sparql_endpoint:
    master_endpoint: <%= ENV.fetch('DDBJ_VALIDATOR_APP_VIRTUOSO_ENDPOINT_MASTER', 'http://localhost:8890/sparql') %>
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy
  ddbj_rdb:
    pg_host:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_HOST'] %>
    pg_port:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_PORT'] %>
    pg_user:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_USER'] %>
    pg_pass:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_PASSWD'] %>
    pg_timeout: '30'
  ddbj_parser:
    parser_api_url: <%= ENV['DDBJ_PARSER_APP_URL'] %>
  eutils_api_key:
    key: your_api_key
  monitoring:
    ssub_id: SSUB009526

test:
  <<: *dev

staging:
  <<: *default
  api_log:
    path: /usr/src/ddbj_validator/logs
  sparql_endpoint:
    master_endpoint: http://ddbj_validator_virtuoso_staging1:8890/sparql
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy-private
  ddbj_rdb:
    pg_host:    # <staging DB host>
    pg_port:    # <staging DB port>
    pg_user:    # <staging DB user>
    pg_pass:    <%= Rails.application.credentials.dig(:postgres, :password) %>
    pg_timeout: '30'
  ddbj_parser:
    parser_api_url: # <staging parser URL (未使用なら空)>
  eutils_api_key:
    key: <%= Rails.application.credentials.eutils_api_key %>
  monitoring:
    ssub_id: SSUB004022

production:
  <<: *default
  api_log:
    path: /usr/src/ddbj_validator/logs
  sparql_endpoint:
    master_endpoint: http://ddbj_validator_virtuoso_production1:8890/sparql
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy-private
  ddbj_rdb:
    pg_host:    # <production DB host>
    pg_port:    # <production DB port>
    pg_user:    # <production DB user>
    pg_pass:    <%= Rails.application.credentials.dig(:postgres, :password) %>
    pg_timeout: '30'
  ddbj_parser:
    parser_api_url: # <production parser URL (未使用なら空)>
  eutils_api_key:
    key: <%= Rails.application.credentials.eutils_api_key %>
  monitoring:
    ssub_id: SSUB004022
