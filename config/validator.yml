# Validator 全体の実行時設定。
#
# - development / test: ENV か固定値。秘密情報は入れない。
# - staging / production: 接続先等の非秘密設定はこのファイル (環境ごとセクション) に、
#   パスワードや API キーは Rails.application.credentials に置く。
#   `bin/rails credentials:edit --environment <env>` で編集。
default: &default
  biosample:
    package_version: '1.5.0'

development: &dev
  <<: *default
  api_log:
    path: logs
  sparql_endpoint:
    master_endpoint: <%= ENV.fetch('DDBJ_VALIDATOR_APP_VIRTUOSO_ENDPOINT_MASTER', 'http://localhost:8890/sparql') %>
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy
  ddbj_rdb:
    pg_host:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_HOST'] %>
    pg_port:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_PORT'] %>
    pg_user:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_USER'] %>
    pg_pass:    <%= ENV['DDBJ_VALIDATOR_APP_POSTGRES_PASSWD'] %>
    pg_timeout: 30
  ddbj_parser:
    parser_api_url: <%= ENV['DDBJ_PARSER_APP_URL'] %>
  eutils_api_key:
    key: your_api_key
  monitoring:
    ssub_id: SSUB009526

test:
  <<: *dev

staging:
  <<: *default
  api_log:
    path: /usr/src/ddbj_validator/logs
  sparql_endpoint:
    # 各 staging インスタンスが自分の virtuoso コンテナ (virtuoso_staging1 / staging2)
    # を見に行くので ENV から受け取る。値は .env で設定。
    master_endpoint: <%= ENV['DDBJ_VALIDATOR_APP_VIRTUOSO_ENDPOINT_MASTER'] %>
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy-private
  ddbj_rdb:
    pg_host:    172.19.15.12
    pg_port:    54301
    pg_user:    const
    pg_pass:    <%= Rails.application.credentials.dig(:postgres, :password) %>
    pg_timeout: 30
  ddbj_parser:
    parser_api_url:
  eutils_api_key:
    key: <%= Rails.application.credentials.eutils_api_key %>
  monitoring:
    ssub_id: SSUB004022

production:
  <<: *default
  api_log:
    path: /usr/src/ddbj_validator/logs
  sparql_endpoint:
    master_endpoint: <%= ENV['DDBJ_VALIDATOR_APP_VIRTUOSO_ENDPOINT_MASTER'] %>
  named_graph_uri:
    taxonomy: http://ddbj.nig.ac.jp/ontologies/taxonomy-private
  ddbj_rdb:
    pg_host:    172.19.15.11
    pg_port:    54301
    pg_user:    const
    pg_pass:    <%= Rails.application.credentials.dig(:postgres, :password) %>
    pg_timeout: 30
  ddbj_parser:
    parser_api_url:
  eutils_api_key:
    key: <%= Rails.application.credentials.eutils_api_key %>
  monitoring:
    ssub_id: SSUB004022
