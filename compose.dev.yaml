# テスト/開発用の Virtuoso + Postgres (fixture 読み込み済み)。
# 本番用 compose.yaml とは別の volume / graph で動く。
#
# 使い方:
#   docker compose -f compose.dev.yaml up -d
#   docker compose -f compose.dev.yaml exec virtuoso isql -U dba -P dba exec='LOAD /fixtures/load.sql;'
#   bin/rails test    # or  bin/rails server
services:
  virtuoso:
    image: openlink/virtuoso-opensource-7:7.2.6-r1-g0a3336c
    ports:
      - '127.0.0.1:8890:8890'
    environment:
      DBA_PASSWORD: dba
      VIRT_Parameters_DirsAllowed: '., /fixtures'
      VIRT_Parameters_NumberOfBuffers: '170000'
      VIRT_Parameters_MaxDirtyBuffers: '130000'
    volumes:
      - ./test/fixtures/virtuoso:/fixtures:ro

  postgres:
    image: postgres:18.3
    ports:
      - '127.0.0.1:15432:5432'
    environment:
      POSTGRES_USER:     validator
      POSTGRES_PASSWORD: validator
      # docker-entrypoint-initdb.d の挙動でデフォルト DB は使わず init.sh で明示的に作成する
      POSTGRES_DB:       postgres
    volumes:
      - ./test/fixtures/postgres:/fixtures:ro
      - ./test/fixtures/postgres/init.sh:/docker-entrypoint-initdb.d/init.sh:ro
