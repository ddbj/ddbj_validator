name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  scan_ruby:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: bin/brakeman --no-pager

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - run: bin/rubocop --format github

  rake-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      # pg gem のビルドに必要
      - run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Start Virtuoso & Postgres with fixtures
        run: docker compose -f compose.test.yaml up -d

      - name: Wait for Virtuoso to accept SPARQL
        run: |
          for _ in $(seq 1 30); do
            curl -sS -m 2 'http://localhost:8890/sparql?query=ASK+WHERE+%7B%7D' > /dev/null && exit 0
            sleep 2
          done
          echo 'Virtuoso did not become ready' >&2
          exit 1

      - name: Wait for Postgres to be ready
        run: |
          for _ in $(seq 1 30); do
            PGPASSWORD=validator psql -h localhost -p 15432 -U validator -d bioproject -c 'select 1 from mass.project limit 1' > /dev/null 2>&1 && exit 0
            sleep 2
          done
          echo 'Postgres did not become ready' >&2
          docker compose -f compose.test.yaml logs postgres | tail -40 >&2
          exit 1

      - name: Load taxonomy / biosample fixture
        run: docker compose -f compose.test.yaml exec -T virtuoso isql -U dba -P dba exec='LOAD /fixtures/load.sql;'

      # -v で各テスト名を標準出力に流す。どのテストで詰まったかを CI ログから特定できるように
      # pub / coll_dump は test/test_helpers.rb が env 経由で test/fixtures を指すので、
      # ここで conf/pub にステージする必要はない
      - run: bin/rails test -v
