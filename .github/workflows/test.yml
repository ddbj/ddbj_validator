name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rake-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # pg gem のビルドに必要
      - run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Start Virtuoso with fixtures
        run: docker compose -f compose.test.yaml up -d

      - name: Wait for Virtuoso to accept SPARQL
        run: |
          for _ in $(seq 1 30); do
            curl -sS -m 2 'http://localhost:8890/sparql?query=ASK+WHERE+%7B%7D' > /dev/null && exit 0
            sleep 2
          done
          echo 'Virtuoso did not become ready' >&2
          exit 1

      - name: Load taxonomy / biosample fixture
        run: docker compose -f compose.test.yaml exec -T virtuoso isql -U dba -P dba exec='LOAD /fixtures/load.sql;'

      # -v で各テスト名を標準出力に流す。どのテストで詰まったかを CI ログから特定できるように
      - run: bundle exec ruby test/run_all.rb -v
